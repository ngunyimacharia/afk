name: Release

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  bump-version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      tag: ${{ steps.version.outputs.tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Check for skip ci
        id: skip
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "skip=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          message=$(git log -1 --pretty=%B)
          if echo "$message" | grep -q '\[skip ci\]'; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Configure git
        if: steps.skip.outputs.skip == 'false'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Bump version
        if: steps.skip.outputs.skip == 'false'
        id: version
        run: |
          npm version patch --no-git-tag-version
          version=$(node -p "require('./package.json').version")
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "tag=v$version" >> "$GITHUB_OUTPUT"

      - name: Commit version bump
        if: steps.skip.outputs.skip == 'false'
        run: |
          git add package.json package-lock.json
          git commit -m "chore(release): bump version to ${{ steps.version.outputs.version }} [skip ci]"
          git push

      - name: Push tag
        if: steps.skip.outputs.skip == 'false'
        run: |
          git tag ${{ steps.version.outputs.tag }}
          git push origin ${{ steps.version.outputs.tag }}

  build-binaries:
    needs: bump-version
    if: needs.bump-version.outputs.version != ''
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: bun-linux-x64
            asset: afk-linux-x64
          - os: macos-latest
            target: bun-darwin-arm64
            asset: afk-darwin-arm64
          - os: macos-13
            target: bun-darwin-x64
            asset: afk-darwin-x64
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.bump-version.outputs.tag }}

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Build binary
        run: |
          mkdir -p dist/bin
          VERSION=$(node -p "require('./package.json').version")
          bun build ./src/bin.ts --compile --target ${{ matrix.target }} --outfile dist/bin/${{ matrix.asset }} --define "process.env.AFK_VERSION=$VERSION"

      - name: Make binary executable
        run: chmod +x dist/bin/${{ matrix.asset }}

      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset }}
          path: dist/bin/${{ matrix.asset }}
          if-no-files-found: error

  create-release:
    needs: [bump-version, build-binaries]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.bump-version.outputs.tag }}

      - name: Download binaries
        uses: actions/download-artifact@v4
        with:
          path: dist/bin
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.bump-version.outputs.tag }}
          name: ${{ needs.bump-version.outputs.tag }}
          files: dist/bin/*
          generate_release_notes: true
